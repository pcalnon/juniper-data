---
#####################################################################################################################################################################################################
# Project:       Juniper
# Sub-Project:   JuniperData
# Application:   juniper_data
# File Name:     lockfile-update.yml
# Author:        Paul Calnon
# Version:       0.1.0
#
# Date Created:  2026-03-02
# Last Modified: 2026-03-02
#
# License:       MIT License
# Copyright:     Copyright (c) 2024-2026 Paul Calnon
#
# Description:
#    Automatically updates requirements.lock when Dependabot pushes a dependency
#    update to a dependabot/pip/** branch. Runs uv pip compile to regenerate
#    the lockfile and commits the result so Docker builds stay in sync.
#
#    Uses CROSS_REPO_DISPATCH_TOKEN (not GITHUB_TOKEN) so the push re-triggers CI.
#
# References:
#    - Step 7.5.2: Dependency Update Workflow (POLYREPO_MIGRATION_PLAN.md)
#####################################################################################################################################################################################################

name: Update Lockfile (Dependabot)

on:
  push:
    branches:
      - dependabot/pip/**

permissions:
  contents: write

jobs:
  update-lockfile:
    name: Update requirements.lock
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          token: ${{ secrets.CROSS_REPO_DISPATCH_TOKEN }}
          ref: ${{ github.ref }}

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.14"

      - name: Install uv
        run: pip install uv

      - name: Regenerate requirements.lock
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       JuniperData - Regenerate Lockfile                    ║"
          echo "╚════════════════════════════════════════════════════════════╝"

          uv pip compile pyproject.toml \
            --extra api \
            --extra observability \
            -o requirements.lock

      - name: Commit updated lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add requirements.lock
          if git diff --cached --quiet; then
            echo "::notice::Lockfile already up to date — no commit needed"
          else
            git commit -m "[dependabot skip] Update requirements.lock"
            git push
          fi
